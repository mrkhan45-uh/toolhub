<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Free online Word Counter tool. Count characters, words, sentences, and paragraphs instantly.">
    <title>Word Counter - Free Online Tool | ToolHub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    
    <style>
        .wc-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .wc-stat-box {
            background: var(--bg-color);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            text-align: center;
        }
        .wc-stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }
        .wc-stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #wc-textarea {
            width: 100%;
            min-height: 250px;
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text-main);
            font-size: 1.1rem;
            resize: vertical;
            transition: var(--transition);
        }
        #wc-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: var(--shadow-hover);
        }
        .wc-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body class="light-mode">

    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <a href="../index.html" class="logo">
                <i class="fas fa-layer-group"></i> ToolHub
            </a>
            <div class="header-actions">
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Dark Mode">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content container">
        
        <!-- Breadcrumbs -->
        <nav aria-label="breadcrumb" style="margin: 1rem 0; color: var(--text-muted); font-size: 0.9rem;">
            <a href="../index.html" style="color: var(--primary);">Home</a> &gt; 
            <span>Text</span> &gt; 
            <strong>Word Counter</strong>
        </nav>

        <section class="tool-header">
            <h1><i class="fas fa-calculator"></i> Word & Character Counter</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Instantly count words, characters, sentences, and paragraphs in real-time.</p>
        </section>

        <!-- Tool Workspace -->
        <section class="tool-workspace" id="workspace">
            
            <div class="wc-stats">
                <div class="wc-stat-box">
                    <div class="wc-stat-value" id="stat-words">0</div>
                    <div class="wc-stat-label">Words</div>
                </div>
                <div class="wc-stat-box">
                    <div class="wc-stat-value" id="stat-chars">0</div>
                    <div class="wc-stat-label">Characters</div>
                </div>
                <div class="wc-stat-box">
                    <div class="wc-stat-value" id="stat-chars-ns">0</div>
                    <div class="wc-stat-label">Chars (No Spaces)</div>
                </div>
                <div class="wc-stat-box">
                    <div class="wc-stat-value" id="stat-sentences">0</div>
                    <div class="wc-stat-label">Sentences</div>
                </div>
            </div>

            <textarea id="wc-textarea" placeholder="Start typing or paste your text here to count..."></textarea>
            
            <div class="wc-actions">
                <button class="btn" id="btn-copy"><i class="fas fa-copy"></i> Copy Text</button>
                <button class="btn secondary" id="btn-clear"><i class="fas fa-trash"></i> Clear</button>
            </div>

        </section>

    </main>
    
    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <script src="../js/script.js"></script>
    <script>
        const textarea = document.getElementById('wc-textarea');
        const statWords = document.getElementById('stat-words');
        const statChars = document.getElementById('stat-chars');
        const statCharsNs = document.getElementById('stat-chars-ns');
        const statSentences = document.getElementById('stat-sentences');
        
        const btnCopy = document.getElementById('btn-copy');
        const btnClear = document.getElementById('btn-clear');

        function updateStats() {
            const text = textarea.value;
            
            // Characters
            statChars.textContent = text.length;
            
            // Characters (No Spaces)
            statCharsNs.textContent = text.replace(/\\s/g, '').length;
            
            // Words
            const words = text.match(/\\b\\w+\\b/g);
            statWords.textContent = words ? words.length : 0;
            
            // Sentences
            const sentences = text.match(/[^.!?]+[.!?]+/g);
            statSentences.textContent = sentences ? sentences.length : (text.length > 0 ? 1 : 0);
        }

        textarea.addEventListener('input', updateStats);
        
        btnCopy.addEventListener('click', () => {
            if(!textarea.value) return;
            navigator.clipboard.writeText(textarea.value).then(() => {
                showToast('Text copied to clipboard!', 'success');
            });
        });
        
        btnClear.addEventListener('click', () => {
            textarea.value = '';
            updateStats();
            textarea.focus();
        });
    </script>
</body>
</html>
