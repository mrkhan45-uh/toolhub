<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - Free Online Tool | ToolHub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    
    <style>
        .pg-container {
            max-width: 600px;
            margin: 0 auto;
            background: var(--surface);
            padding: 2.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }
        .pg-display {
            display: flex;
            align-items: center;
            background: var(--bg-color);
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            margin-bottom: 2rem;
            transition: var(--transition);
        }
        .pg-display:focus-within {
            border-color: var(--primary);
        }
        .pg-display input {
            flex-grow: 1;
            background: transparent;
            border: none;
            font-size: 1.5rem;
            font-family: monospace;
            color: var(--text-main);
            outline: none;
            text-align: center;
        }
        .pg-display button {
            background: none;
            border: none;
            color: var(--primary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
        }
        .pg-slider-container { margin-bottom: 2rem; }
        .pg-slider-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }
        .pg-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .pg-checkbox {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .pg-checkbox input {
            width: 18px;
            height: 18px;
            accent-color: var(--primary);
        }
        .pg-meta {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .strength-bar {
            height: 6px;
            border-radius: 3px;
            background: var(--border);
            margin-top: 1rem;
            overflow: hidden;
            position: relative;
        }
        .strength-fill {
            height: 100%;
            width: 0%;
            background: #ef4444;
            transition: width 0.3s, background 0.3s;
        }
    </style>
</head>
<body class="light-mode">

    <header class="header">
        <div class="container header-content">
            <a href="../index.html" class="logo"><i class="fas fa-layer-group"></i> ToolHub</a>
            <button id="theme-toggle" class="icon-btn"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <main class="main-content container">
        <nav aria-label="breadcrumb" style="margin: 1rem 0; color: var(--text-muted); font-size: 0.9rem;">
            <a href="../index.html" style="color: var(--primary);">Home</a> &gt; <span>Security</span> &gt; <strong>Password Generator</strong>
        </nav>

        <section class="tool-header">
            <h1><i class="fas fa-key"></i> Password Generator</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Generate strong, secure passwords instantly in your browser.</p>
        </section>

        <!-- Workspace -->
        <section class="tool-workspace" id="workspace">
            
            <div class="pg-container">
                <div class="pg-display">
                    <input type="text" id="pg-output" readonly value="Loading...">
                    <button class="icon-btn" id="pg-copy" title="Copy to clipboard"><i class="fas fa-copy"></i></button>
                </div>
                
                <div class="strength-bar"><div class="strength-fill" id="pg-strength"></div></div>
                <div class="pg-meta" id="pg-strength-text">Strength: Normal</div>

                <div class="pg-slider-container" style="margin-top:2rem;">
                    <div class="pg-slider-header">
                        <span>Password Length</span>
                        <span id="pg-len-val">16</span>
                    </div>
                    <input type="range" id="pg-length" min="8" max="64" value="16">
                </div>

                <div class="pg-options">
                    <label class="pg-checkbox">
                        <input type="checkbox" id="pg-uppercase" checked> Uppercase (A-Z)
                    </label>
                    <label class="pg-checkbox">
                        <input type="checkbox" id="pg-lowercase" checked> Lowercase (a-z)
                    </label>
                    <label class="pg-checkbox">
                        <input type="checkbox" id="pg-numbers" checked> Numbers (0-9)
                    </label>
                    <label class="pg-checkbox">
                        <input type="checkbox" id="pg-symbols" checked> Symbols (!@#$)
                    </label>
                </div>

                <button class="btn" style="width: 100%;" id="pg-generate"><i class="fas fa-sync-alt"></i> Generate Password</button>
            </div>

        </section>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script src="../js/script.js"></script>
    <script>
        const output = document.getElementById('pg-output');
        const lengthSlider = document.getElementById('pg-length');
        const lengthVal = document.getElementById('pg-len-val');
        const chkUpper = document.getElementById('pg-uppercase');
        const chkLower = document.getElementById('pg-lowercase');
        const chkNum = document.getElementById('pg-numbers');
        const chkSym = document.getElementById('pg-symbols');
        const btnGen = document.getElementById('pg-generate');
        const btnCopy = document.getElementById('pg-copy');
        
        const strengthFill = document.getElementById('pg-strength');
        const strengthText = document.getElementById('pg-strength-text');

        const upperSet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const lowerSet = "abcdefghijklmnopqrstuvwxyz";
        const numSet = "0123456789";
        const symSet = "!@#$%^&*()_+~`|}{[]:;?><,./-=";

        function checkStrength(len, types) {
            let str = 0;
            if (len >= 12) str += 1;
            if (len >= 16) str += 1;
            if (len >= 24) str += 1;
            str += (types - 1); // 1 type=0, 4 types=3
            
            // Map 0-6 score to visually UI
            let width = '20%';
            let color = '#ef4444'; // weak red
            let text = 'Weak';
            
            if (str >= 2) { width = '50%'; color = '#f59e0b'; text = 'Good'; } // orange
            if (str >= 4) { width = '80%'; color = '#10b981'; text = 'Strong'; } // green
            if (str >= 5) { width = '100%'; color = '#059669'; text = 'Very Strong'; } // dark green
            
            strengthFill.style.width = width;
            strengthFill.style.background = color;
            strengthText.textContent = `Strength: ${text}`;
        }

        function generatePassword() {
            const len = parseInt(lengthSlider.value);
            let charPool = "";
            let requiredChars = [];
            let types = 0;

            if(chkUpper.checked) { charPool += upperSet; requiredChars.push(upperSet); types++; }
            if(chkLower.checked) { charPool += lowerSet; requiredChars.push(lowerSet); types++; }
            if(chkNum.checked) { charPool += numSet; requiredChars.push(numSet); types++; }
            if(chkSym.checked) { charPool += symSet; requiredChars.push(symSet); types++; }

            if(charPool.length === 0) {
                output.value = "Select at least one option!";
                return;
            }

            // High entropy random using web crypto
            let pass = "";
            let randomVals = new Uint32Array(len);
            window.crypto.getRandomValues(randomVals);

            // Ensure at least one character from each selected pool
            for(let i = 0; i < requiredChars.length; i++) {
                let pool = requiredChars[i];
                pass += pool[randomVals[i] % pool.length];
            }

            // Fill the rest
            for(let i = requiredChars.length; i < len; i++) {
                pass += charPool[randomVals[i] % charPool.length];
            }

            // Shuffle password string to mix the required chars from the start
            pass = pass.split('').sort(() => 0.5 - Math.random()).join('');

            output.value = pass;
            checkStrength(len, types);
        }

        lengthSlider.addEventListener('input', () => {
            lengthVal.textContent = lengthSlider.value;
            generatePassword();
        });

        [chkUpper, chkLower, chkNum, chkSym].forEach(chk => {
            chk.addEventListener('change', generatePassword);
        });

        btnGen.addEventListener('click', generatePassword);

        btnCopy.addEventListener('click', () => {
            if(output.value === "Select at least one option!") return;
            navigator.clipboard.writeText(output.value).then(() => {
                showToast('Password copied to clipboard!', 'success');
            });
        });

        // Initial Generation
        generatePassword();

    </script>
</body>
</html>
