<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer - Free Online Tool | ToolHub</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    
    <style>
        .upload-area {
            border: 2px dashed var(--primary);
            border-radius: var(--radius);
            padding: 3rem;
            text-align: center;
            background: rgba(79, 70, 229, 0.05);
            cursor: pointer;
            transition: var(--transition);
        }
        .upload-area:hover {
            background: rgba(79, 70, 229, 0.1);
        }
        .upload-area i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }
        #file-input { display: none; }
        
        .resize-controls {
            display: none;
            margin-top: 2rem;
            background: var(--surface);
            padding: 1.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }
        .control-group {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            align-items: center;
        }
        .control-group input {
            padding: 0.5rem;
            width: 100px;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        #preview-img {
            max-width: 100%;
            height: auto;
            border-radius: var(--radius);
            margin-top: 1rem;
            box-shadow: var(--shadow-sm);
        }
        .canvas-container { display: none; }
    </style>
</head>
<body class="light-mode">

    <!-- Header -->
    <header class="header">
        <div class="container header-content">
            <a href="../index.html" class="logo"><i class="fas fa-layer-group"></i> ToolHub</a>
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle Mode"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <main class="main-content container">
        <nav aria-label="breadcrumb" style="margin: 1rem 0; color: var(--text-muted); font-size: 0.9rem;">
            <a href="../index.html" style="color: var(--primary);">Home</a> &gt; <span>Image</span> &gt; <strong>Image Resizer</strong>
        </nav>

        <section class="tool-header">
            <h1><i class="fas fa-expand-arrows-alt"></i> Image Resizer</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Resize images securely in your browser. No server uploads.</p>
        </section>

        <!-- Workspace -->
        <section class="tool-workspace" id="workspace">
            <div class="upload-area" id="drop-zone" onclick="document.getElementById('file-input').click()">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>Drag & Drop or Click to Upload</h3>
                <p>Supports JPG, PNG, WEBP</p>
                <input type="file" id="file-input" accept="image/png, image/jpeg, image/webp">
            </div>

            <div class="resize-controls" id="resize-controls">
                <h3>Resize Settings</h3>
                <div class="control-group">
                    <label>Width (px):</label>
                    <input type="number" id="img-width">
                    <label>Height (px):</label>
                    <input type="number" id="img-height">
                    <label style="font-size: 0.9em; margin-left:1rem;">
                        <input type="checkbox" id="keep-ratio" checked> Keep Aspect Ratio
                    </label>
                </div>
                
                <button class="btn" id="btn-download"><i class="fas fa-download"></i> Download Resized</button>
                <button class="btn secondary" id="btn-reset" onclick="location.reload()">Reset</button>

                <div style="margin-top: 2rem;">
                    <h4>Preview:</h4>
                    <img id="preview-img" src="" alt="Preview">
                </div>
            </div>

            <div class="canvas-container"><canvas id="canvas"></canvas></div>
        </section>
    </main>

    <div id="toast-container" class="toast-container"></div>

    <script src="../js/script.js"></script>
    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const resizeControls = document.getElementById('resize-controls');
        const previewImg = document.getElementById('preview-img');
        const widthInput = document.getElementById('img-width');
        const heightInput = document.getElementById('img-height');
        const keepRatio = document.getElementById('keep-ratio');
        const btnDownload = document.getElementById('btn-download');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let originalImg = new Image();
        let aspectRatio = 1;
        let fileType = 'image/jpeg';
        let fileName = 'resized_image';

        // File Handler
        function handleFile(file) {
            if(!file || !file.type.startsWith('image/')) {
                showToast('Please select a valid image file', 'error');
                return;
            }
            
            fileType = file.type;
            fileName = file.name.split('.')[0] + '_resized';
            
            const reader = new FileReader();
            reader.onload = (e) => {
                originalImg.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // Image Load Handler
        originalImg.onload = () => {
            dropZone.style.display = 'none';
            resizeControls.style.display = 'block';
            
            aspectRatio = originalImg.width / originalImg.height;
            widthInput.value = originalImg.width;
            heightInput.value = originalImg.height;
            
            previewImg.src = originalImg.src;
        };

        // Aspect Ratio Maintenance
        widthInput.addEventListener('input', () => {
            if(keepRatio.checked && widthInput.value > 0) {
                heightInput.value = Math.round(widthInput.value / aspectRatio);
            }
        });
        
        heightInput.addEventListener('input', () => {
            if(keepRatio.checked && heightInput.value > 0) {
                widthInput.value = Math.round(heightInput.value * aspectRatio);
            }
        });

        // Download Action
        btnDownload.addEventListener('click', () => {
            const w = parseInt(widthInput.value);
            const h = parseInt(heightInput.value);
            
            if(!w || !h || w <= 0 || h <= 0) {
                showToast('Width and Height must be greater than 0', 'error');
                return;
            }
            
            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(originalImg, 0, 0, w, h);
            
            // Trigger Download
            const link = document.createElement('a');
            link.download = fileName + (fileType.includes('png') ? '.png' : '.jpg');
            link.href = canvas.toDataURL(fileType, 0.9);
            link.click();
            
            showToast('Image successfully resized and downloaded!', 'success');
        });

        // Event Listeners for file input
        fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        
        // Drag and drop setup
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary-hover)';
        });
        dropZone.addEventListener('dragleave', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary)';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'var(--primary)';
            handleFile(e.dataTransfer.files[0]);
        });
    </script>
</body>
</html>
